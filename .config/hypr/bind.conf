# Window bindings:
bind = SUPER, A, fullscreen, 0
bind = SUPER, C, centerwindow
bind = SUPER, F, togglefloating
bind = SUPER, F, centerwindow
bind = SUPER, Q, killactive
bind = SUPER SHIFT, Q, exit

# Applications:
bind = SUPER, T, exec, wezterm
bind = SUPER, B, exec, chromium

# Screenshots:
bind = SUPER SHIFT, S, exec, grim -g "$(slurp -c B08BBB -w 1 -b B08BBB80)"

# Backlight:
bind = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/backlight.sh --inc 
bind = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/backlight.sh --dec

# Focus with SUPER + HJKL:
bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d

# Switch workspaces with SUPER + [0-5]:
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

# Move windows with SUPER + SHIFT + [0-5]:
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5

# Resizing submap:
bind = SUPER, R, submap, resize
submap = resize
binde = , right, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , up, resizeactive, 0 -10
binde = , down, resizeactive, 0 10
bind = , escape, submap, reset 
submap = reset
