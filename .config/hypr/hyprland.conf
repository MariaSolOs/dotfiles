# Environment variables:
env = XCURSOR_SIZE, 16
env = GDK_SCALE, 2
env = WLR_NO_HARDWARE_CURSORS, 1

# High resolution monitor.
monitor = , highres, auto, 2

# Execute on startup:
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # Update DBus environment.
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # Import stuff for XDPH.
exec-once = /usr/lib/polkit-kde-authentication-agent-1 # Authentication agent.
exec-once = swaybg -i ~/Pictures/Wallpapers/pixel-pink-cloudy-moon.png # Wallpaper.
exec-once = wl-paste --watch cliphist store # Clipboard.
exec-once = swayidle -w # Lock screen when idle.
exec-once = ags # Widgets.

input {
    kb_layout = us
    # macOS-like scrolling.
    touchpad {
        natural_scroll = true
    }
}

general {
    gaps_in = 2 # Gaps between windows.
    gaps_out = 2 # Gaps between windows and monitors edges.
    border_size = 1 # Border size around windows.
    cursor_inactive_timeout = 5 # Hide cursor after 5 seconds of inactivity.
    resize_on_border = true # Resize windows by dragging their borders.
}

decoration {
    rounding = 5 # Window border radius.
    blur {
        enabled = false # I don't use this.
    }
}

# Smooth animations:
animations {
    first_launch_animation = false
    bezier = easeOut, 0.2, 1, 0.2, 1
    animation = windows, 1, 5, easeOut
    animation = windowsIn, 1, 5, default, popin
    animation = workspaces, 1, 6, default
}

misc {
    # Disable the default anime background.
    disable_hyprland_logo = true
    # Wake up with key/mouse activity:
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# Avoid blurry XWayland apps.
xwayland {
    force_zero_scaling = true
}

source = ~/.config/hypr/bind.conf # Keybindings.
source = ~/.config/hypr/windowrule.conf # Window rules.
