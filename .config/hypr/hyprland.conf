env = XCURSOR_SIZE,16 # Cursor size.

# High resolution monitor.
monitor=,highres,auto,2

# Execute on startup:
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # Update DBus environment.
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # Import stuff for XDPH.
exec-once = /usr/lib/polkit-kde-authentication-agent-1 # Authentication agent.
exec-once = wl-paste --type text --watch cliphist store # Clipboard for text data.
exec-once = wl-paste --type image --watch cliphist store # Clipboard for image data.
exec-once = dunst # Notification daemon.

input {
    kb_layout = us
    touchpad {
        natural_scroll = true # macOS-like scrolling.
    }
}

# 3-finger swiping.
gestures {
    workspace_swipe = true
    workspace_swipe_distance = 200
}

general {
    gaps_in = 2 # Gaps between windows.
    gaps_out = 2 # Gaps between windows and monitors edges.
    border_size = 1 # Border size around windows.
}

decoration {
    rounding = 5 # Window border radius.
    blur {
        enabled = false # I don't use this.
    }
}

# Smooth animations.
animations {
    enabled = yes
    bezier = easeOut, 0.2, 1, 0.2, 1
    animation = windows, 1, 5, easeOut
    animation = windowsIn, 1, 5, default, popin
    animation = workspaces, 1, 6, default
}

misc {
    disable_hyprland_logo = true # Disable the default anime background.
}

xwayland {
    force_zero_scaling = true # Avoid blurry XWayland apps.
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

$mainMod = SUPER

bind = $mainMod, T, exec, wezterm
bind = $mainMod, W, killactive,
bind = $mainMod, X, exit,

# Move focus with mainMod + HJKL.
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-5]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
