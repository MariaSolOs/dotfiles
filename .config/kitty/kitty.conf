# vim:fileencoding=utf-8:foldmethod=marker

# Fonts {{{
font_family Macon Book
italic_font Macon RegularItalic
font_size 14.0
modify_font cell_width 95%
modify_font underline_position 4
text_composition_strategy legacy
# Some characters look weird in italics, so use the original font for them.
symbol_map U+002A,U+002D,U+00AD,U+2212,U+002E,U+0026,U+007C Macon Book
}}}

# Cursor {{{
cursor_blink_interval 0
}}}

# Mouse {{{
mouse_hide_wait 10.0
url_style double
}}}

# Tab bar {{{
tab_bar_edge top
tab_bar_margin_width 5
tab_bar_margin_height 5 0
tab_bar_style separator
tab_bar_min_tabs 2
tab_separator ""
tab_title_template "{fmt.fg._5c6370}{fmt.bg.default}{fmt.fg._abb2bf}{fmt.bg._5c6370} {tab.active_oldest_wd} {fmt.fg._5c6370}{fmt.bg.default} "
active_tab_title_template "{fmt.fg._BAA0E8}{fmt.bg.default}{fmt.fg.default}{fmt.bg._BAA0E8} {tab.active_oldest_wd} {fmt.fg._BAA0E8}{fmt.bg.default} "
}}}

# OS stuff {{{
macos_option_as_alt yes
macos_quit_when_last_window_closed yes
}}}

# Keyboard shortcuts {{{
kitty_mod cmd+shift
map cmd+s send_text all \x13
map cmd+t new_tab_with_cwd
}}}

# Move between tabs {{{
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
}}}

# Dracula color theme {{{
foreground #f8f8f2
selection_foreground #ffffff
selection_background #44475a
url_color #8be9fd
# black
color0 #21222c
color8 #6272a4
# red
color1 #ff5555
color9 #ff6e6e
# green
color2 #50fa7b
color10 #69ff94
# yellow
color3 #f1fa8c
color11 #ffffa5
# blue
color4 #bd93f9
color12 #d6acff
# magenta
color5 #ff79c6
color13 #ff92df
# cyan
color6 #8be9fd
color14 #a4ffff
# white
color7 #f8f8f2
color15 #ffffff
# Cursor colors
cursor #f8f8f2
cursor_text_color background
# Marks
mark1_foreground #282a36
mark1_background #ff5555
# Splits/Windows
active_border_color #f8f8f2
inactive_border_color #6272a4
}}}
